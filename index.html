<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Stress Test - SPIN Method</title>
    <style>
        :root { --primary: #003399; --secondary: #f4f4f9; --accent: #00aaff; --text: #333; }
        body { font-family: 'Arial', sans-serif; background: var(--secondary); display: flex; justify-content: center; padding: 20px; }
        #quiz-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); max-width: 500px; width: 100%; }
        .hidden { display: none; }
        h2 { color: var(--primary); line-height: 1.4; margin-bottom: 25px; }
        .btn { display: block; width: 100%; padding: 15px; margin: 12px 0; border: 1px solid #ddd; border-radius: 10px; background: white; cursor: pointer; transition: 0.3s; text-align: left; font-size: 1rem; }
        .btn:hover { background: var(--primary); color: white; }
        .progress-container { height: 6px; background: #eee; border-radius: 3px; margin-bottom: 30px; }
        .progress-bar { height: 100%; background: var(--accent); width: 0%; transition: 0.4s; }
        .tag { display: inline-block; padding: 4px 10px; background: #eef; color: var(--primary); border-radius: 5px; font-size: 0.8rem; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="quiz-card">
    <div class="progress-container"><div class="progress-bar" id="bar"></div></div>

    <div id="step-start">
        <span class="tag">ANALISIS RISIKO</span>
        <h2>Siapa yang ingin Anda lindungi masa depannya hari ini?</h2>
        <button class="btn" onclick="initSpin('single')">Diri Sendiri (Fokus Karier)</button>
        <button class="btn" onclick="initSpin('parent')">Keluarga & Anak (Fokus Proteksi)</button>
        <button class="btn" onclick="initSpin('senior')">Aset & Warisan (Fokus Distribusi)</button>
    </div>

    <div id="spin-container" class="hidden">
        <span class="tag" id="spin-label"></span>
        <h2 id="spin-question"></h2>
        <div id="spin-options"></div>
    </div>

    <div id="result" class="hidden" style="text-align: center;">
        <h2>Analisis Selesai</h2>
        <div style="font-size: 4rem; font-weight: bold; color: #d9534f;" id="final-score">0</div>
        <p id="feedback" style="font-size: 1.1rem; color: #555;"></p>
        <a href="https://wa.me/628123456789?text=Saya%20ingin%20konsultasi%20hasil%20kuis%20saya" 
           style="background: #25d366; color: white; padding: 15px 25px; text-decoration: none; border-radius: 10px; display: inline-block; margin-top: 20px; font-weight: bold;">
           Konsultasi Solusi Syariah
        </a>
    </div>
</div>

<script>
    const spinData = {
        parent: [
            { stage: "Situation", q: "Berapa orang yang bergantung pada penghasilan Anda saat ini?", a: [{t: "1-2 Orang", s: 10}, {t: "3-5 Orang", s: 20}, {t: "Lebih dari 5", s: 30}] },
            { stage: "Problem", q: "Jika 'keran' gaji berhenti, berapa lama tabungan Anda bisa menghidupi mereka?", a: [{t: "Kurang dari 3 bulan", s: 40}, {t: "6 bulan", s: 20}, {t: "Sudah ada dana darurat 1 tahun", s: 5}] },
            { stage: "Implication", q: "Jika tabungan habis, biaya mana yang terpaksa Anda 'korbankan'?", a: [{t: "Dana Pendidikan Anak", s: 30}, {t: "Gaya Hidup/Cicilan", s: 10}, {t: "Aset Properti", s: 20}] },
            { stage: "Need-payoff", q: "Seberapa penting memiliki dana instan yang menjamin sekolah anak tetap jalan apapun risikonya?", a: [{t: "Sangat Penting", s: 0}, {t: "Cukup Penting", s: 5}] }
        ],
        single: [
            { stage: "Situation", q: "Berapa persen dari gaji Anda yang dialokasikan untuk gaya hidup & cicilan?", a: [{t: "> 50%", s: 20}, {t: "30-50%", s: 10}, {t: "< 30%", s: 5}] },
            { stage: "Problem", q: "Siapa yang akan membayar cicilan tersebut jika Anda sakit dan tak bisa bekerja?", a: [{t: "Orang Tua/Tabungan", s: 40}, {t: "Kantor", s: 20}, {t: "Sudah ada asuransi", s: 5}] },
            { stage: "Implication", q: "Jika aset habis untuk biaya RS, apakah Anda siap memulai karier dari nol lagi?", a: [{t: "Sangat Tidak Siap", s: 30}, {t: "Mungkin Terpaksa", s: 10}] },
            { stage: "Need-payoff", q: "Inginkah Anda memiliki proteksi pendapatan agar gaya hidup tetap terjaga saat risiko terjadi?", a: [{t: "Ya, Tentu", s: 0}, {t: "Lihat nanti", s: 5}] }
        ],
        senior: [
            { stage: "Situation", q: "Berapa banyak aset produktif yang sudah Anda siapkan untuk hari tua?", a: [{t: "Sedang membangun", s: 20}, {t: "Sudah cukup banyak", s: 10}] },
            { stage: "Problem", q: "Apakah biaya penyakit kritis di masa tua berpotensi menggerus aset warisan tersebut?", a: [{t: "Sangat Berisiko", s: 40}, {t: "Kecil kemungkinannya", s: 10}] },
            { stage: "Implication", q: "Seberapa besar beban pajak/biaya balik nama yang akan ditanggung ahli waris Anda nanti?", a: [{t: "Belum tahu/Besar", s: 30}, {t: "Sudah dihitung", s: 5}] },
            { stage: "Need-payoff", q: "Seberapa berharga memiliki sistem yang menjaga aset Anda tetap utuh sampai ke tangan anak cucu?", a: [{t: "Sangat Berharga", s: 0}, {t: "Biasa saja", s: 5}] }
        ]
    };

    let activePath = [];
    let step = 0;
    let riskScore = 0;

    function initSpin(profile) {
        activePath = spinData[profile];
        document.getElementById('step-start').classList.add('hidden');
        document.getElementById('spin-container').classList.remove('hidden');
        renderStep();
    }

    function renderStep() {
        const data = activePath[step];
        document.getElementById('spin-label').innerText = data.stage;
        document.getElementById('spin-question').innerText = data.q;
        const optDiv = document.getElementById('spin-options');
        optDiv.innerHTML = '';
        
        data.a.forEach(ans => {
            const b = document.createElement('button');
            b.className = 'btn';
            b.innerText = ans.t;
            b.onclick = () => {
                riskScore += ans.s;
                step++;
                if(step < activePath.length) renderStep(); else finish();
            };
            optDiv.appendChild(b);
        });
        document.getElementById('bar').style.width = ((step+1)/activePath.length)*100 + '%';
    }

    function finish() {
        document.getElementById('spin-container').classList.add('hidden');
        document.getElementById('result').classList.remove('hidden');
        
        // Dalam kuis asuransi, skor tinggi = risiko tinggi
        document.getElementById('final-score').innerText = riskScore + "%";
        let msg = riskScore > 60 ? "Risiko finansial Anda sangat kritis. Anda butuh 'Jaring Pengaman' segera." : "Anda memiliki risiko moderat. Beberapa celah perlu ditutup agar lebih aman.";
        document.getElementById('feedback').innerText = msg;
    }
</script>
</body>
</html>
